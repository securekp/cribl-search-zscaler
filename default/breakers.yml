Zscaler Datatypes:
  lib: custom
  description: Zscaler Datatypes for ZIA NSS logs
  tags: zscalernss-dns,zscalernss-web,zscalernss-fw,zscalernss-casb,zscalernss-audit,zscalernss-emaildlp
  minRawLength: 256
  rules:
    - condition: sourcetype == 'zscalernss-dns'
      type: json
      timestampAnchorRegex: /^/
      timestamp:
        type: auto
        length: 150
      timestampTimezone: local
      timestampEarliest: -1772129964s
      timestampLatest: +10years
      maxEventBytes: 51200
      disabled: false
      parserEnabled: true
      shouldUseDataRaw: false
      parser:
        mode: extract
        type: json
        srcField: _raw.event
        remove: []
        fieldFilterExpr: value !== 'N/A' && value !== 'NA' && value !== 'None'
        fields:
          - sourcetype
          - datetime
          - user
          - department
          - location
          - reqaction
          - resaction
          - reqrulelabel
          - resrulelabel
          - dns_reqtype
          - dns_req
          - dns_resp
          - srv_dport
          - durationms
          - clt_sip
          - srv_dip
          - category
          - respipcategory
          - deviceowner
          - devicehostname
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: Zscaler-nss DNS
      fields:
        - name: datatype
          value: "'zscalerdatatypes_zscaler-nssdns'"
